<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <meta name="description" content="MAX SPEED Racing Shop - Dashboard Management System" />
    <title>MAX SPEED RACING SHOP Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- DNS prefetch untuk koneksi lebih cepat -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
      body {
        margin: 0;
        background: #09090b; /* hsl(var(--background)) equivalent */
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }
      #preloader {
        position: fixed;
        inset: 0;
        background: #09090b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }
      .loader-track {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        position: relative;
        overflow: hidden;
      }
      .loader-car {
        position: absolute;
        height: 100%;
        width: 40px;
        background: linear-gradient(to right, transparent, #f97316); /* orange-500 */
        border-radius: 2px;
        animation: race 1s infinite linear;
      }
      .loader-text {
        color: #f97316;
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        letter-spacing: 0.2em;
        font-size: 0.75rem;
        text-transform: uppercase;
        animation: pulse 1s infinite ease-in-out;
      }
      @keyframes race {
        0% { transform: translateX(-40px); }
        100% { transform: translateX(200px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="loader-content">
        <div class="loader-track">
          <div class="loader-car"></div>
        </div>
        <div class="loader-text">Loading Pitlane...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove preloader once app is mounted
      window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        if (preloader) {
          preloader.style.opacity = '0';
          setTimeout(() => preloader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
